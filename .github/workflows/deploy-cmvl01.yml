name: Deploy cmvl01 qxyx edgetunnel

on:
  push:
    branches:
      - main
    paths:
      - "_worker.js"
      - "wrangler.cmvl01.toml"
      - ".github/workflows/deploy-cmvl01.yml"
  schedule:
    - cron: "7 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cmvl01-qxyx-edgetunnel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler
        run: npm install --no-save wrangler@latest

      - name: Keep Worker secrets in sync
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_CMVL01_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_CMVL01_ACCOUNT_ID }}
          EDGE_UUID: ${{ secrets.EDGE_CMVL01_UUID }}
          EDGE_ADMIN: ${{ secrets.EDGE_CMVL01_ADMIN }}
        run: |
          set -euo pipefail
          printf '%s' "$EDGE_UUID" | npx wrangler secret put UUID --config wrangler.cmvl01.toml
          printf '%s' "$EDGE_ADMIN" | npx wrangler secret put ADMIN --config wrangler.cmvl01.toml

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_CMVL01_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_CMVL01_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.cmvl01.toml
