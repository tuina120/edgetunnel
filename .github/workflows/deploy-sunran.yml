name: Deploy cmvl sunran edgetunnel

on:
  push:
    branches:
      - main
    paths:
      - "_worker.js"
      - "worker.sunran.js"
      - "wrangler.sunran.toml"
      - ".github/workflows/deploy-sunran.yml"
  schedule:
    - cron: "57 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cmvl-sunran-edgetunnel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler
        run: npm install --no-save wrangler@latest

      - name: Keep Worker secrets in sync
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_SUNRAN_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_SUNRAN_ACCOUNT_ID }}
          EDGE_UUID: ${{ secrets.EDGE_SUNRAN_UUID }}
          EDGE_ADMIN: ${{ secrets.EDGE_SUNRAN_ADMIN }}
        run: |
          set -euo pipefail
          printf '%s' "$EDGE_UUID" | npx wrangler secret put UUID --config wrangler.sunran.toml
          printf '%s' "$EDGE_ADMIN" | npx wrangler secret put ADMIN --config wrangler.sunran.toml

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_SUNRAN_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_SUNRAN_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.sunran.toml
