name: Sync upstream\n\non:\n  schedule:\n    - cron: "17 3 * * *"\n  workflow_dispatch:\n\npermissions:\n  contents: write\n\njobs:\n  sync:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout fork\n        uses: actions/checkout@v4\n        with:\n          fetch-depth: 0\n          token: ${{ secrets.GITHUB_TOKEN }}\n      - name: Sync upstream main\n        run: |\n          git remote add upstream https://github.com/cmliu/edgetunnel.git\n          git fetch upstream main\n          git checkout main\n          git merge --no-edit -X ours upstream/main || true\n          git config user.name "github-actions[bot]"\n          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"\n          if [ -f wrangler.toml ]; then\n            sed -i "s/^name = .*/name = \"cmvl\"/" wrangler.toml\n            git add wrangler.toml\n            git diff --cached --quiet || git commit -m "chore: keep Cloudflare Worker name cmvl"\n          fi\n          git push origin main\n